
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Intan Nadia ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Courier New', monospace;
}

body{
background:black;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* GALAXY BACKGROUND */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%, #ff0055 0%, transparent 20%),
radial-gradient(circle at 80% 20%, #7700ff 0%, transparent 25%),
radial-gradient(circle at 70% 70%, #00ccff 0%, transparent 20%),
radial-gradient(circle at 30% 80%, #ff0088 0%, transparent 25%);

animation:galaxy 20s infinite alternate;

opacity:.25;
}

@keyframes galaxy{

0%{
transform:scale(1) rotate(0deg);
}

100%{
transform:scale(1.2) rotate(5deg);
}

}

canvas{
position:absolute;
top:0;
left:0;
}

/* CENTER */

#center{
position:relative;
z-index:10;
text-align:center;
}

/* LOVE 3D */

#love{

font-size:140px;
font-weight:bold;

background:linear-gradient(
45deg,
#ff0055,
#ff77aa,
#ffffff,
#ff0055
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px #ff0055,
0 0 20px #ff0055,
0 0 40px #ff0055,
0 0 80px #ff0055;

animation:
beat 1.2s infinite,
rotate3d 6s infinite ease-in-out;

transform-style:preserve-3d;

letter-spacing:10px;
}

/* HEART BEAT */

@keyframes beat{

0%{
transform:scale(1);
}

25%{
transform:scale(1.1);
}

50%{
transform:scale(1);
}

75%{
transform:scale(1.15);
}

100%{
transform:scale(1);
}

}

/* 3D ROTATION */

@keyframes rotate3d{

0%{
transform:
rotateY(0deg)
rotateX(0deg)
scale(1);
}

25%{
transform:
rotateY(12deg)
rotateX(4deg)
scale(1.08);
}

50%{
transform:
rotateY(0deg)
rotateX(0deg)
scale(1);
}

75%{
transform:
rotateY(-12deg)
rotateX(-4deg)
scale(1.08);
}

100%{
transform:
rotateY(0deg)
rotateX(0deg)
scale(1);
}

}

/* MAIN TEXT */

#msg{

margin-top:20px;

color:#ffffff;

font-size:30px;

text-shadow:
0 0 10px #ff0055,
0 0 20px #ff0055;

font-weight:bold;

}

/* SUBTEXT */

#sub{

margin-top:20px;

color:#ff99bb;

font-size:18px;

line-height:1.8;

text-shadow:0 0 10px #ff0055;

}

/* BUTTON */

#musicBtn{

position:absolute;

bottom:30px;
left:50%;

transform:translateX(-50%);

padding:14px 34px;

border:none;

border-radius:50px;

background:#ff0055;

color:white;

font-size:18px;

cursor:pointer;

z-index:20;

box-shadow:
0 0 15px #ff0055,
0 0 30px #ff0055;

}

/* FIREWORK */

.firework{

position:absolute;

width:8px;
height:8px;

border-radius:50%;

background:#ff0055;

animation:explode 1.5s linear forwards;

z-index:3;

}

@keyframes explode{

0%{
transform:scale(0);
opacity:1;
}

100%{
transform:scale(18);
opacity:0;
}

}

</style>
</head>

<body>

<div id="center">

<div id="love">
LOVE
</div>

<div id="msg">
Happy Birthday Intan Nadia 🎂
</div>

<div id="sub">

You may not belong to me anymore,<br>
but a part of my heart still belongs to you ✨<br><br>

Thank you for every memory,<br>
every smile,<br>
and every moment we once shared 🤍

</div>

</div>

<button id="musicBtn">
▶ PLAY MUSIC
</button>

<canvas id="canvas"></canvas>

<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/t-asabina/music/main/A-Thousand-Years.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "INTANNADIALOVE0123456789";
const fontSize = 16;

const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

/* HEART SHAPE */

function isInsideHeart(x,y){

x = (x - canvas.width / 2) / 25;
y = (canvas.height / 2 - y) / 25;

return Math.pow(x*x + y*y - 1,3)
- x*x*y*y*y <= 0;

}

/* MATRIX DRAW */

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){

const text =
letters.charAt(
Math.floor(Math.random() * letters.length)
);

const x = i * fontSize;
const y = drops[i] * fontSize;

if(isInsideHeart(x,y)){

ctx.fillStyle = "#ff0055";

ctx.shadowBlur = 15;
ctx.shadowColor = "#ff0055";

}else{

ctx.fillStyle = "#111";
ctx.shadowBlur = 0;

}

ctx.fillText(text,x,y);

if(y > canvas.height && Math.random() > 0.975){

drops[i] = 0;

}

drops[i]++;

}

requestAnimationFrame(draw);

}

draw();

/* FIREWORKS */

function createFirework(){

const fw = document.createElement('div');

fw.classList.add('firework');

fw.style.left =
Math.random() * window.innerWidth + "px";

fw.style.top =
Math.random() * window.innerHeight + "px";

document.body.appendChild(fw);

setTimeout(()=>{
fw.remove();
},1500);

}

setInterval(createFirework,250);

/* MUSIC */

const music = document.getElementById('bgMusic');

document.getElementById('musicBtn')
.addEventListener('click',()=>{

music.play();

document.getElementById('musicBtn')
.innerHTML = "💖 MUSIC PLAYING";

});

/* MOBILE AUTOPLAY */

document.body.addEventListener('touchstart',()=>{

music.play();

},{once:true});

/* RESPONSIVE */

window.addEventListener('resize',()=>{

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

});

</script>

</body>
</html>
