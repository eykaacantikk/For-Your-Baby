<!DOCTYPE html>
<html>
<head>
    <title>For Intan Nadia ❤️</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; }
        #msg { position: relative; color: white; font-size: 22px; text-align: center; z-index: 10; text-shadow: 0 0 15px #FF69B4; transition: opacity 1s; padding: 0 20px; line-height: 1.5; }
        .controls { position: fixed; bottom: 20px; color: white; z-index: 20; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="msg">Hai Awak... ❤️</div>
    
    <!-- Muzik A Thousand Years -->
    <iframe style="display:none" src="https://www.youtube.com/embed/rtOvBOTyXFE?autoplay=1&loop=1&playlist=rtOvBOTyXFE" allow="autoplay"></iframe>
    <audio autoplay loop>
        <source src="https://raw.githubusercontent.com/t-asabina/music/main/A-Thousand-Years.mp3" type="audio/mpeg">
    

    <canvas id="heartCanvas"></canvas>
    
    <div class="controls">Klik skrin jika lagu tidak berbunyi</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const HEART_COLOR = "#FF69B4";
        // Ucapan khas untuk Intan Nadia
        const ucapan = [
            "Happy Birthday Intan Nadia 🎂",
            "Even kita dah tak sehaluan...",
            "Tapi tarikh ni tetap orang ingat ✨",
            "Jaga diri okey...",
            "I Love You 🤍"
        ];
        
        let idx = 0;
        setInterval(() => {
            msgDiv.style.opacity = 0;
            setTimeout(() => {
                idx = (idx + 1) % ucapan.length;
                msgDiv.innerHTML = ucapan[idx];
                msgDiv.style.opacity = 1;
            }, 1000);
        }, 4500);

        function heart_function(t, shrink_ratio) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * shrink_ratio + canvas.width / 2, y: canvas.height / 2 - y * shrink_ratio };
        }

        function scatter_inside(x, y, beta = 0.15) {
            let ratio_x = -beta * Math.log(Math.random());
            let ratio_y = -beta * Math.log(Math.random());
            return { x: x - ratio_x * (x - canvas.width / 2), y: y - ratio_y * (y - canvas.height / 2) };
        }

        let scale = 12; let growing = true;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 2000; i++) {
                let t = Math.random() * 2 * Math.PI;
                let p = heart_function(t, scale);
                p = scatter_inside(p.x, p.y);
                ctx.fillStyle = HEART_COLOR;
                ctx.fillRect(p.x, p.y, 2, 2);
            }
            if (growing) { scale += 0.05; if (scale >= 15) growing = false; }
            else { scale -= 0.05; if (scale <= 12) growing = true; }
            requestAnimationFrame(draw);
        }
        draw();
        
        // Benarkan audio selepas klik
        document.body.addEventListener('click', () => {
            const audio = document.querySelector('audio');
            if(audio) audio.play();
        });
    </script>
</body>
</html>
