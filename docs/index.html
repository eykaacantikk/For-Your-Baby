<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For Intan Nadia 💜</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Courier New', monospace;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

#msg{
    position:absolute;
    z-index:20;
    color:#d580ff;
    font-size:32px;
    font-weight:bold;
    text-align:center;
    text-shadow:
        0 0 10px #c800ff,
        0 0 20px #c800ff,
        0 0 40px #8a2be2;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        opacity:.8;
        transform:scale(1);
    }
    to{
        opacity:1;
        transform:scale(1.05);
    }
}
</style>
</head>

<body>

<div id="msg">Happy Birthday Intan Nadia 💜</div>

<canvas id="matrix"></canvas>
<canvas id="particleCanvas"></canvas>
<canvas id="fireworks"></canvas>

<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/t-asabina/music/main/A-Thousand-Years.mp3" type="audio/mpeg">
</audio>

<script>
/* =========================
   CANVAS SETUP
========================= */

const matrixCanvas = document.getElementById("matrix");
const particleCanvas = document.getElementById("particleCanvas");
const fireworksCanvas = document.getElementById("fireworks");

const mtx = matrixCanvas.getContext("2d");
const ptx = particleCanvas.getContext("2d");
const ftx = fireworksCanvas.getContext("2d");

function resizeCanvas(){
    matrixCanvas.width =
    particleCanvas.width =
    fireworksCanvas.width = window.innerWidth;

    matrixCanvas.height =
    particleCanvas.height =
    fireworksCanvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* =========================
   PURPLE MATRIX RAIN
========================= */

const letters =
"INTANNADIALOVE0123456789💜✨";

const fontSize = 16;
const columns = matrixCanvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix(){

    mtx.fillStyle = "rgba(0,0,0,0.06)";
    mtx.fillRect(
        0,
        0,
        matrixCanvas.width,
        matrixCanvas.height
    );

    mtx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){

        const text =
        letters[Math.floor(Math.random()*letters.length)];

        const x = i * fontSize;
        const y = drops[i] * fontSize;

        mtx.fillStyle = "#b026ff";

        mtx.shadowBlur = 20;
        mtx.shadowColor = "#d580ff";

        mtx.fillText(text,x,y);

        if(y > matrixCanvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }

        drops[i]++;
    }

    requestAnimationFrame(drawMatrix);
}

drawMatrix();

/* =========================
   PARTICLE TEXT
========================= */

const particles = [];

function createTextParticles(){

    const offCanvas =
    document.createElement("canvas");

    const offCtx =
    offCanvas.getContext("2d");

    offCanvas.width = particleCanvas.width;
    offCanvas.height = particleCanvas.height;

    offCtx.fillStyle = "white";

    offCtx.font =
    "bold 120px Arial";

    offCtx.textAlign = "center";

    offCtx.fillText(
        "INTAN NADIA",
        offCanvas.width/2,
        offCanvas.height/2
    );

    const data =
    offCtx.getImageData(
        0,
        0,
        offCanvas.width,
        offCanvas.height
    );

    particles.length = 0;

    for(let y=0;y<data.height;y+=6){

        for(let x=0;x<data.width;x+=6){

            const index =
            (y * data.width + x) * 4;

            if(data.data[index+3] > 128){

                particles.push({
                    x:Math.random()*particleCanvas.width,
                    y:Math.random()*particleCanvas.height,
                    tx:x,
                    ty:y,
                    size:2,
                    speed:0.03
                });

            }
        }
    }
}

createTextParticles();

function animateParticles(){

    ptx.clearRect(
        0,
        0,
        particleCanvas.width,
        particleCanvas.height
    );

    for(let p of particles){

        p.x += (p.tx - p.x) * p.speed;
        p.y += (p.ty - p.y) * p.speed;

        ptx.beginPath();

        ptx.fillStyle = "#d580ff";

        ptx.shadowBlur = 15;
        ptx.shadowColor = "#ff66ff";

        ptx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ptx.fill();
    }

    requestAnimationFrame(animateParticles);
}

animateParticles();

/* =========================
   FIREWORKS
========================= */

const fireworks = [];

function random(min,max){
    return Math.random()*(max-min)+min;
}

class Firework{
    constructor(){

        this.x = random(100, fireworksCanvas.width-100);
        this.y = fireworksCanvas.height;

        this.targetY =
        random(100, fireworksCanvas.height/2);

        this.speed = 4;

        this.particles = [];

        this.exploded = false;
    }

    update(){

        if(!this.exploded){

            this.y -= this.speed;

            ftx.beginPath();

            ftx.fillStyle = "#ffffff";

            ftx.arc(
                this.x,
                this.y,
                3,
                0,
                Math.PI*2
            );

            ftx.fill();

            if(this.y <= this.targetY){

                this.exploded = true;

                for(let i=0;i<80;i++){

                    this.particles.push({
                        x:this.x,
                        y:this.y,
                        dx:random(-4,4),
                        dy:random(-4,4),
                        life:100
                    });

                }
            }

        } else {

            this.particles.forEach((p,index)=>{

                p.x += p.dx;
                p.y += p.dy;

                p.life--;

                ftx.beginPath();

                ftx.fillStyle =
                `rgba(213,128,255,${
                    p.life/100
                })`;

                ftx.arc(
                    p.x,
                    p.y,
                    2,
                    0,
                    Math.PI*2
                );

                ftx.fill();

                if(p.life <= 0){
                    this.particles.splice(index,1);
                }

            });
        }
    }
}

function animateFireworks(){

    ftx.clearRect(
        0,
        0,
        fireworksCanvas.width,
        fireworksCanvas.height
    );

    if(Math.random() < 0.03){
        fireworks.push(new Firework());
    }

    fireworks.forEach((fw,index)=>{

        fw.update();

        if(
            fw.exploded &&
            fw.particles.length === 0
        ){
            fireworks.splice(index,1);
        }
    });

    requestAnimationFrame(animateFireworks);
}

animateFireworks();

/* =========================
   MUSIC
========================= */

window.addEventListener("click",()=>{

    document
    .getElementById("bgMusic")
    .play();

});
</script>

</body>
</html>
