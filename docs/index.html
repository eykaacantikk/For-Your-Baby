
  <!DOCTYPE html>
 <html>
 <head>
     <title>For Intan Nadia ❤️</title>
     <style>
         body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
         canvas { position: absolute; left: 0; top: 0; }
         #msg {
             position: relative; z-index: 10; color: #ff0055; font-family: 'Courier New', Courier, monospace;
             font-size: 24px; text-align: center; text-shadow: 0 0 15px #ff0055;
             transition: opacity 1.5s; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px;
         }
     </style>
 </head>
 <body>
     <div id="msg">Happy Birthday Intan Nadia 🎂</div>
     <canvas id="canvas"></canvas>
     <audio id="bgMusic" loop>
         <source src="https://raw.githubusercontent.com/t-asabina/music/main/A-Thousand-Years.mp3" type="audio/mpeg">
     
     <script>
         const canvas = document.getElementById('canvas');
         const ctx = canvas.getContext('2d');
         const msgDiv = document.getElementById('msg');
         canvas.width = window.innerWidth;
         canvas.height = window.innerHeight;
         const katakana = "HAPPYBIRTHDAYINTANNADIA1234567890LOVE";
         const fontSize = 16;
         const columns = canvas.width / fontSize;
         const drops = Array(Math.floor(columns)).fill(1);
         const ucapan = [
             "Happy Birthday Intan Nadia 🎂",
             "Even kita dah tak sehaluan...",
             "Tapi tarikh ni tetap orang ingat ✨",
             "Jaga diri okey...",
             "I Love You 🤍"
         ];
         
         let idx = 0;
         setInterval(() => {
             msgDiv.style.opacity = 0;
             setTimeout(() => {
                 idx = (idx + 1) % ucapan.length;
                 msgDiv.innerHTML = ucapan[idx];
                 msgDiv.style.opacity = 1;
             }, 1000);
         }, 4500);
         function isInsideHeart(x, y) {
             // Formula jantung untuk menentukan kedudukan hujan kod
             x = (x - canvas.width / 2) / 20;
             y = (canvas.height / 2 - y) / 20;
             return Math.pow(x * x + y * y - 1, 3) - x * x * y * y * y <= 0;
         }
         function draw() {
             ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
             ctx.fillRect(0, 0, canvas.width, canvas.height);
             for (let i = 0; i < drops.length; i++) {
                 const text = katakana.charAt(Math.floor(Math.random() * katakana.length));
                 const x = i * fontSize;
                 const y = drops[i] * fontSize;
                 // Jika di dalam kawasan jantung, warna jadi Merah Jambu, jika di luar warna Gelap/Kelabu
                 if (isInsideHeart(x, y)) {
                     ctx.fillStyle = "#ff0055"; // Warna hujan jantung
                     ctx.shadowBlur = 10;
                     ctx.shadowColor = "#ff0055";
                 } else {
                     ctx.fillStyle = "#111"; // Warna hujan latar belakang (gelap)
                     ctx.shadowBlur = 0;
                 }
                 ctx.fillText(text, x, y);
                 if (y > canvas.height && Math.random() > 0.975) {
                     drops[i] = 0;
                 }
                 drops[i]++;
             }
             requestAnimationFrame(draw);
         }
         ctx.font = fontSize + "px monospace";
         draw();
         window.addEventListener('click', () => {
             document.getElementById('bgMusic').play();
         });
     </script>
 </body>
 </html>
