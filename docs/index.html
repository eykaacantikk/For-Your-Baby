<!DOCTYPE html>
 <html>
 <head>
     <title>Pulsating Heart</title>
     <style>
         body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
         canvas { position: absolute; }
         #msg { position: relative; color: white; font-size: 25px; text-align: center; z-index: 10; text-shadow: 0 0 15px #FF69B4; transition: opacity 1s; }
     </style>
 </head>
 <body>
     <div id="msg">Hai Awak... ❤️</div>
     <canvas id="heartCanvas"></canvas>
     <script>
         const canvas = document.getElementById('heartCanvas');
         const ctx = canvas.getContext('2d');
         const msgDiv = document.getElementById('msg');
         canvas.width = window.innerWidth;
         canvas.height = window.innerHeight;
         const HEART_COLOR = "#FF69B4";
         const ucapan = ["Hai Awak...", "Selamat Hari Jadi! ❤️", "Semoga sentiasa bahagia", "I Love You!"];
         let idx = 0;
         setInterval(() => {
             msgDiv.style.opacity = 0;
             setTimeout(() => {
                 idx = (idx + 1) % ucapan.length;
                 msgDiv.innerHTML = ucapan[idx];
                 msgDiv.style.opacity = 1;
             }, 1000);
         }, 4000);
         function heart_function(t, shrink_ratio) {
             let x = 16 * Math.pow(Math.sin(t), 3);
             let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
             return { 
                 x: x * shrink_ratio + canvas.width / 2, 
                 y: canvas.height / 2 - y * shrink_ratio 
             };
         }
         // Fungsi yang tertinggal dalam kod anda tadi
         function scatter_inside(x, y, beta = 0.15) {
             let ratio_x = -beta * Math.log(Math.random());
             let ratio_y = -beta * Math.log(Math.random());
             let dx = ratio_x * (x - canvas.width / 2);
             let dy = ratio_y * (y - canvas.height / 2);
             return { x: x - dx, y: y - dy };
         }
         let scale = 12; 
         let growing = true;
         function draw() {
             ctx.clearRect(0, 0, canvas.width, canvas.height);
             for (let i = 0; i < 2000; i++) {
                 let t = Math.random() * 2 * Math.PI;
                 let p = heart_function(t, scale);
                 p = scatter_inside(p.x, p.y); // Sekarang fungsi ini sudah ada
                 ctx.fillStyle = HEART_COLOR;
                 ctx.fillRect(p.x, p.y, 2, 2);
             }
             if (growing) { scale += 0.05; if (scale >= 15) growing = false; }
             else { scale -= 0.05; if (scale <= 12) growing = true; }
             requestAnimationFrame(draw);
         }
         draw();
     </script>
 </body>
 </html>
