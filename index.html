<!DOCTYPE html>
 <html lang="ms">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Intan Nadia</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
     <script>
         tailwind.config = {
             theme: {
                 extend: {
                     colors: {
                         malam: '#0F172A',
                         senja: '#1E1B4B',
                         lembut: '#E0E7FF',
                         merah: '#BE123C',
                     },
                     fontFamily: {
                         lexend: ['Lexend', 'sans-serif'],
                     }
                 }
             }
         }
     </script>
     <style type="text/tailwindcss">
         @layer utilities {
             .text-3d {
                 text-shadow: 2px 2px 0 #4F46E5, 4px 4px 0 #312E81;
             }
             .heart-3d {
                 filter: drop-shadow(0 0 15px rgba(255, 51, 102, 0.6));
             }
             .rain {
                 background: linear-gradient(to bottom, transparent, rgba(200, 220, 255, 0.3));
                 width: 1px;
                 height: 80px;
                 position: absolute;
                 animation: turun 1.8s linear infinite;
             }
             @keyframes turun {
                 0% { transform: translateY(-100px); }
                 100% { transform: translateY(100vh); }
             }
             .glow {
                 text-shadow: 0 0 8px rgba(255,255,255,0.8), 0 0 16px rgba(191,219,254,0.6);
             }
         }
     </style>
 </head>
 <body class="font-lexend bg-gradient-to-br from-malam to-senja min-h-screen overflow-hidden relative">
     <!-- Kesan Hujan -->
     <div id="hujan" class="absolute inset-0 z-0"></div>
     <!-- Bangunan Jauh Berlampu -->
     <div class="absolute bottom-0 left-0 w-1/3 h-40 opacity-70 z-10">
         <div class="w-full h-full bg-[#1A1A2E] clip-path-polygon"></div>
         <div class="absolute inset-0">
             <div class="w-1 h-2 bg-yellow-200 absolute top-10 left-6 animate-pulse"></div>
             <div class="w-1 h-2 bg-blue-200 absolute top-16 left-12 animate-pulse delay-300"></div>
             <div class="w-1 h-2 bg-pink-200 absolute top-8 left-20 animate-pulse delay-700"></div>
             <div class="w-1 h-2 bg-white absolute top-14 left-28 animate-pulse"></div>
         </div>
     </div>
     <!-- Kandungan Utama -->
     <div class="relative z-20 min-h-screen flex flex-col items-center justify-center px-4 text-center">
         <!-- Nama Intan Nadia -->
         <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-bold text-white text-3d mb-4">
             Intan Nadia
         </h1>
         <!-- Bentuk Hati Besar 3D -->
         <div class="relative w-48 h-48 md:w-56 md:h-56 heart-3d mb-6">
             <svg viewBox="0 0 100 90" class="w-full h-full fill-red-500 stroke-red-700 stroke-[1]">
                 <path d="M50,20 C30,0 0,15 0,45 C0,75 50,90 50,90 C50,90 100,75 100,45 C100,15 70,0 50,20 Z"/>
             </svg>
             <!-- Tulisan "love" kecil rawak dalam hati -->
             <div class="absolute inset-0 flex flex-wrap items-center justify-center gap-2 opacity-80">
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
                 <span class="text-xs text-white">love</span>
             </div>
         </div>
         <!-- Teks Sebelah Kiri -->
         <div class="w-full max-w-xs md:max-w-sm text-left mb-6">
             <p class="text-white text-sm md:text-base leading-relaxed glow">
                 Even ayang macam tak ambil kisah pasal baby tapi ayang selalu jaga care baby dari jauh
             </p>
         </div>
         <!-- Teks Sebelah Kanan -->
         <div class="w-full max-w-xs md:max-w-sm text-right">
             <p class="text-white text-sm md:text-base leading-relaxed glow">
                 I love you baby, sorry for everything, ayang support baby dari jauh tau
             </p>
         </div>
     </div>
     <script>
         // Buat titisan hujan automatik
         const hujanKawasan = document.getElementById('hujan');
         for (let i = 0; i < 120; i++) {
             let titisan = document.createElement('div');
             titisan.classList.add('rain');
             titisan.style.left = `${Math.random() * 100}%`;
             titisan.style.animationDelay = `${Math.random() * 2}s`;
             titisan.style.height = `${Math.random() * 40 + 40}px`;
             hujanKawasan.appendChild(titisan);
         }
     </script>
 </body>
 </html>
