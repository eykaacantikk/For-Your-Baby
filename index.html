<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Baby 💎</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    perspective: 1000px;
  }

  /* 1. Latar Belakang Bandar Neon */
 .city {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30vh;
    background:
      linear-gradient(to top, #000 0%, transparent 100%),
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200"><rect fill="%23111" width="1000" height="200"/><rect x="50" y="80" width="30" height="120" fill="%23222"/><rect x="100" y="50" width="40" height="150" fill="%23222"/><rect x="160" y="100" width="25" height="100" fill="%23222"/><rect x="200" y="60" width="35" height="140" fill="%23222"/><rect x="250" y="90" width="30" height="110" fill="%23222"/><rect x="300" y="40" width="50" height="160" fill="%23222"/><rect x="370" y="70" width="30" height="130" fill="%23222"/><rect x="420" y="90" width="40" height="110" fill="%23222"/><rect x="480" y="60" width="35" height="140" fill="%23222"/><rect x="530" y="80" width="30" height="120" fill="%23222"/><rect x="580" y="50" width="45" height="150" fill="%23222"/><rect x="640" y="100" width="30" height="100" fill="%23222"/><rect x="690" y="70" width="40" height="130" fill="%23222"/><rect x="750" y="60" width="35" height="140" fill="%23222"/><rect x="800" y="90" width="30" height="110" fill="%23222"/><rect x="850" y="40" width="50" height="160" fill="%23222"/><rect x="920" y="80" width="30" height="120" fill="%23222"/></svg>');
    background-size: cover;
    z-index: 1;
  }
 .city::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      transparent, transparent 19px,
      rgba(255, 0, 100,.2) 20px
    );
    animation: cityGlow 2s infinite alternate;
  }
  @keyframes cityGlow { from {opacity:.3} to {opacity:.8} }

  /* 2. Refleksi Air */
 .water {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30vh;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,50,100,.3) 100%);
    transform: scaleY(-1);
    opacity: 0.4;
    filter: blur(2px);
    z-index: 2;
  }

  /* 3. Canvas Matrix Hujan Kod */
  canvas#matrix {
    position: absolute;
    top: 0; left: 0;
    z-index: 3;
  }

  /* 4. Teks LOVE 3D Kaca Neon Tengah */
 .love-3d {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateX(15deg);
    font-size: 15vw;
    font-weight: 900;
    color: transparent;
    text-shadow:
      0 0 10px #ff00ff,
      0 0 20px #ff00ff,
      0 0 40px #00ffff,
      0 0 80px #ff00ff,
      0 0 120px #00ffff;
    animation: neonPulse 2s infinite alternate, float 4s ease-in-out infinite;
    z-index: 10;
    background: linear-gradient(45deg, rgba(255,0,255,.2), rgba(0,255,255,.2));
    -webkit-background-clip: text;
    border: 2px solid rgba(0,255,255,.5);
    padding: 0 5vw;
    border-radius: 20px;
    backdrop-filter: blur(5px);
  }
  @keyframes neonPulse {
    from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; }
    to { text-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff, 0 0 120px #ff00ff; }
  }
  @keyframes float { 0%,100%{transform: translate(-50%, -52%) rotateX(15deg)} 50%{transform: translate(-50%, -48%) rotateX(10deg)} }

  /* 5. Meteor */
 .meteor {
    position: absolute;
    width: 2px;
    height: 100px;
    background: linear-gradient(transparent, #fff, #00ffff);
    animation: meteorFall 3s linear infinite;
    opacity: 0;
    z-index: 4;
  }
  @keyframes meteorFall {
    0% { transform: translateY(-200px) translateX(0) rotate(45deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(100vh) translateX(200px) rotate(45deg); opacity: 0; }
  }

  /* 6. Teks Kiri Kanan */
 .text-box {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 25%;
    font-size: 1.1vw;
    line-height: 1.6;
    text-shadow: 0 0 10px #ff00ff;
    z-index: 10;
    animation: fadeIn 3s;
  }
 .left-text { left: 5%; text-align: left; color: #ffccff; }
 .right-text { right: 5%; text-align: right; color: #ccffff; }

  /* 7. Goodluck Sem 2 Bawah */
 .goodluck {
    position: absolute;
    bottom: 5%;
    width: 100%;
    text-align: center;
    font-size: 3vw;
    font-weight: bold;
    color: #ff3366;
    text-shadow: 0 0 20px #ff3366, 0 0 40px #ff6699;
    animation: heartbeat 1.5s infinite;
    z-index: 10;
  }
  @keyframes heartbeat { 0%,100%{transform: scale(1)} 50%{transform: scale(1.1)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* Hati Besar Neon 3D belakang LOVE */
 .heart-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(3);
    font-size: 10vw;
    color: #ff0033;
    filter: blur(30px);
    opacity: 0.5;
    animation: pulse 2s infinite;
    z-index: 5;
  }
  @keyframes pulse { 0%,100%{transform: translate(-50%, -50%) scale(3)} 50%{transform: translate(-50%, -50%) scale(3.2)} }

</style>
</head>
<body>

  <div class="heart-bg">❤️</div>
  <div class="love-3d">LOVE</div>
  <div class="city"></div>
  <div class="water"></div>
  <canvas id="matrix"></canvas>

  <div class="text-box left-text">
    even ayang macam tak amik kisah pasal baby<br>
    tapi ayang selalu support baby diam ii tau 💕
  </div>

  <div class="text-box right-text">
    sorry for everythings baby 🥺<br>
    i love babyy,<br>
    goodluckk muahh 😘
  </div>

  <div class="goodluck">❤️ Goodluck Sem 2 ❤️</div>

<script>
  // Matrix Hujan Kod Bentuk Hati
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = "LOVE BABY 01❤️";
  const fontSize = 16;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  // Function check kalau dalam bentuk hati
  function isInHeart(x, y) {
    x = (x - canvas.width/2) / (canvas.width/4);
    y = (y - canvas.height/2) / (canvas.height/4);
    return Math.pow(x*x + y*y - 1, 3) - x*x*y <= 0;
  }

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#0F0';
    ctx.font = fontSize + 'px monospace';

    for(let i = 0; i < drops.length; i++) {
      const x = i * fontSize;
      const y = drops[i] * fontSize;

      // Hanya drop kalau dalam bentuk hati
      if(isInHeart(x, y)) {
        ctx.fillStyle = `hsl(${Math.random()*60 + 300}, 100%, 50%)`; // Pink-Cyan
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
      }

      if(y > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 33);

  // Generate Meteor
  function createMeteor() {
    const meteor = document.createElement('div');
    meteor.className = 'meteor';
    meteor.style.left = Math.random() * 100 + 'vw';
    meteor.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(meteor);
    setTimeout(() => meteor.remove(), 3000);
  }
  setInterval(createMeteor, 800);

  // Resize
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
