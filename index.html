<!DOCTYPE html>
<html>
<head>
    <title>Pulsating Heart</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;
        const CANVAS_CENTER_X = 400, CANVAS_CENTER_Y = 400;
        const HEART_COLOR = "#FF69B4";

        function heart_function(t, shrink_ratio) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            x *= shrink_ratio; y *= shrink_ratio;
            return { x: x + CANVAS_CENTER_X, y: CANVAS_CENTER_Y - y };
        }

        function scatter_inside(x, y, beta = 0.05) {
            let ratio_x = -beta * Math.log(Math.random());
            let ratio_y = -beta * Math.log(Math.random());
            return { x: x - ratio_x * (x - CANVAS_CENTER_X), y: y - ratio_y * (y - CANVAS_CENTER_Y) };
        }

        let scale = 12; let growing = true;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 2000; i++) {
                let t = Math.random() * 2 * Math.PI;
                let p = heart_function(t, scale);
                p = scatter_inside(p.x, p.y);
                ctx.fillStyle = HEART_COLOR;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, 2 * Math.PI);
                ctx.fill();
            }
            if (growing) { scale += 0.1; if (scale >= 14) growing = false; }
            else { scale -= 0.1; if (scale <= 12) growing = true; }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
