<!DOCTYPE html>
 <html lang="ms">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Intan Nadia</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
     <script>
         tailwind.config = {
             theme: {
                 extend: {
                     colors: {
                         malam: '#080A1F',
                         senja: '#12183F',
                         lembut: '#E0E7FF',
                         merahHati: '#FF2D55',
                         merahGelap: '#990A29',
                     },
                     fontFamily: {
                         lexend: ['Lexend', 'sans-serif'],
                     },
                     animation: {
                         'denyut': 'denyut 2s ease-in-out infinite',
                         'kilau': 'kilau 3s ease-in-out infinite',
                         'jatuh': 'jatuh-love 4s linear infinite',
                         'kelap': 'kelap 2s ease-in-out infinite',
                     },
                     keyframes: {
                         denyut: {
                             '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0 0 15px rgba(255,45,85,0.6))' },
                             '50%': { transform: 'scale(1.08)', filter: 'drop-shadow(0 0 25px rgba(255,45,85,0.9))' }
                         },
                         kilau: {
                             '0%, 100%': { textShadow: '0 0 8px rgba(255,255,255,0.6)' },
                             '50%': { textShadow: '0 0 18px rgba(255,255,255,1), 0 0 30px rgba(191,219,254,0.8)' }
                         },
                         'jatuh-love': {
                             '0%': { transform: 'translateY(-100%)', opacity: 0 },
                             '20%': { opacity: 0.7 },
                             '100%': { transform: 'translateY(100%)', opacity: 0 }
                         },
                         kelap: {
                             '0%, 100%': { opacity: 0.4 },
                             '50%': { opacity: 1 }
                         }
                     }
                 }
             }
         }
     </script>
     <style type="text/tailwindcss">
         .rain {
             width: 1.5px;
             height: 70px;
             position: absolute;
             background: linear-gradient(to bottom, transparent, rgba(220, 230, 255, 0.7));
             animation: hujanTurun 2s linear infinite;
         }
         @keyframes hujanTurun {
             0% { transform: translateY(-80px); }
             100% { transform: translateY(100vh); }
         }
     </style>
 </head>
 <body class="font-lexend bg-gradient-to-br from-malam to-senja min-h-screen overflow-hidden relative">
     <!-- Kesan Hujan Bergerak -->
     <div id="latarHujan" class="absolute inset-0 z-0"></div>
     <!-- Bangunan Berlampu Berkelip -->
     <div class="absolute bottom-0 left-0 w-1/3 h-44 z-10">
         <div class="w-full h-full bg-[#101426] clip-path-polygon"></div>
         <div class="absolute inset-0">
             <div class="w-1.5 h-2.5 bg-yellow-200 absolute top-12 left-8 animate-kelap"></div>
             <div class="w-1.5 h-2.5 bg-blue-200 absolute top-20 left-16 animate-kelap delay-200"></div>
             <div class="w-1.5 h-2.5 bg-pink-200 absolute top-10 left-26 animate-kelap delay-500"></div>
             <div class="w-1.5 h-2.5 bg-white absolute top-18 left-36 animate-kelap delay-700"></div>
         </div>
     </div>
     <!-- Kandungan Utama -->
     <div class="relative z-20 min-h-screen flex flex-col items-center justify-center px-5 text-center">
         <!-- Nama Intan Nadia (Bergerak Berkilau) -->
         <h1 class="text-[clamp(2.8rem,7vw,4.5rem)] font-bold text-white animate-kilau mb-6">
             Intan Nadia
         </h1>
         <!-- Hati Besar 3D Berdenyut -->
         <div class="relative w-52 h-52 md:w-60 md:h-60 animate-denyut mb-8">
             <svg viewBox="0 0 100 90" class="w-full h-full fill-merahHati stroke-merahGelap stroke-[1.5]">
                 <path d="M50,20 C30,0 0,15 0,45 C0,75 50,90 50,90 C50,90 100,75 100,45 C100,15 70,0 50,20 Z"/>
             </svg>
             <!-- Perkataan "love" Kecil Jatuh Bergerak Dalam Hati -->
             <div id="kandunganHati" class="absolute inset-0 overflow-hidden"></div>
         </div>
         <!-- Teks Sebelah Kiri -->
         <div class="w-full max-w-md text-left mb-6">
             <p class="text-white text-sm md:text-base leading-relaxed animate-kilau">
                 Even ayang macam tak ambil kisah pasal baby tapi ayang selalu jaga care baby dari jauh
             </p>
         </div>
         <!-- Teks Sebelah Kanan -->
         <div class="w-full max-w-md text-right">
             <p class="text-white text-sm md:text-base leading-relaxed animate-kilau">
                 I love you baby, sorry for everything, ayang support baby dari jauh tau
             </p>
         </div>
     </div>
     <script>
         // Buat titisan hujan bergerak
         const kawasanHujan = document.getElementById('latarHujan');
         for (let i = 0; i < 150; i++) {
             let titisan = document.createElement('div');
             titisan.classList.add('rain');
             titisan.style.left = `${Math.random() * 100}%`;
             titisan.style.animationDelay = `${Math.random() * 2.5}s`;
             titisan.style.height = `${Math.random() * 50 + 50}px`;
             kawasanHujan.appendChild(titisan);
         }
         // Buat perkataan "love" jatuh dalam hati
         const dalamHati = document.getElementById('kandunganHati');
         function buatLoveJatuh() {
             let teksLove = document.createElement('span');
             teksLove.innerText = 'love';
             teksLove.className = 'absolute text-xs md:text-sm text-white/80 font-light animate-jatuh';
             teksLove.style.left = `${Math.random() * 90}%`;
             teksLove.style.animationDuration = `${Math.random() * 2 + 3}s`;
             dalamHati.appendChild(teksLove);
             // Buang selepas habis animasi
             setTimeout(() => teksLove.remove(), 5000);
         }
         setInterval(buatLoveJatuh, 300);
     </script>
 </body>
 </html>
