<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Baby 💜</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:radial-gradient(circle,#13001f,#000);
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1200px;
    font-family:Arial,sans-serif;
}

.scene{
    position:relative;
    transform-style:preserve-3d;
    animation:rotate 12s linear infinite;
}

@keyframes rotate{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.heart{
    position:relative;
    width:180px;
    height:180px;
    transform:rotate(-45deg);
    background:#b300ff;
    box-shadow:
    0 0 30px #c84cff,
    0 0 60px #c84cff,
    0 0 100px #b300ff;
    animation:beat 1s infinite;
}

.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:#b300ff;
}

.heart:before{
    top:-90px;
    left:0;
}

.heart:after{
    left:90px;
    top:0;
}

@keyframes beat{
    0%,100%{
        transform:rotate(-45deg) scale(1);
    }
    50%{
        transform:rotate(-45deg) scale(1.15);
    }
}

.text{
    position:absolute;
    width:90%;
    text-align:center;
    color:white;
    text-shadow:0 0 10px #d86fff,0 0 20px #d86fff;
    font-size:22px;
    line-height:1.8;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #b300ff;
    }
    to{
        text-shadow:0 0 30px #ff66ff;
    }
}

.floating{
    position:absolute;
    color:#d86fff;
    font-size:22px;
    animation:fly linear infinite;
}

@keyframes fly{
    from{
        transform:translateY(100vh) scale(0.5);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="scene">
    <div class="heart"></div>
</div>

<div class="text">
💜 Goodluck Exam STPM Sem 2 💜<br><br>

Ayang selalu support baby.<br>

Baby nampak ja ayang tak care pasal baby,<br>
tapi ayang selalu perati baby dari jauh. 🤍<br><br>

I LOVE YOU SO MUCHHHH 💜
</div>

<script>
function createHeart(){

const heart=document.createElement("div");

heart.className="floating";
heart.innerHTML="💜";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*4+4)+"s";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,180);
</script>

</body>
</html>
